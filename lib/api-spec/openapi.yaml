  /card-video/jobs:
    post:
      operationId: createCardVideoJob
      tags: [social]
      summary: Start a server-side MP4 render of an animated share-card (admin only)
      description: >-
        Renders the EXACT same data-bound card the browser previews into a
        guaranteed-compatible H.264/MP4, off the main thread, as a job. `input`
        and `options` are the opaque ShareCardInput + RenderOptions JSON the
        client already builds for the preview (the union lives in the frontend).
        Returns a job id to poll; the browser MediaRecorder path remains as a
        fallback. Admin-only (enforced by route middleware).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CardVideoJobInput"
      responses:
        "201":
          description: Render job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardVideoJob"

  /card-video/jobs/{id}:
    get:
      operationId: getCardVideoJob
      tags: [social]
      summary: Poll the status/progress of a card-video render job (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Current job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CardVideoJob"
        "404":
          description: Unknown job

  /card-video/jobs/{id}/download:
    get:
      operationId: downloadCardVideoJob
      tags: [social]
      summary: Download the finished MP4 for a completed job (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The rendered MP4 file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Unknown job or not yet finished

  /tenant-brand:
    get:
      operationId: getTenantBrand
      tags: [tenant]
      summary: >-
        Resolve the current tenant's brand (name, short name, logo, colours).
        Tenant is resolved per-request by the tenant-context middleware.
      responses:
        "200":
          description: The tenant's brand
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/TenantBrand"
                  - $ref: "#/components/schemas/PlatformBrand"
                description: >-
                  A tenant's brand on a club host, or the platform marker on the
                  apex/marketing host (no tenant — the SPA mounts the landing page).

  /tenant-plan:
    get:
      operationId: getTenantPlan
      tags: [tenant]
      summary: >-
        The current tenant's plan and resolved feature entitlements. While billing
        is dormant (BILLING_ENABLED unset) every feature resolves to true, so the
        web can adopt the gating now without locking anything during the pilot.
      responses:
        "200":
          description: The tenant's plan and entitlements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TenantPlan"

  /platform/available-clubs:
    get:
      operationId: getAvailableClubs
      tags: [platform]
      summary: >-
        Central PCA clubs available to claim via self-serve signup (those not yet
        onboarded as a tenant). Empty / 403 when signup is disabled.
      responses:
        "200":
          description: Clubs available to claim
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableClub"
        "403":
          description: Signup is disabled (SIGNUP_MODE=off).

  /platform/slug-available:
    get:
      operationId: checkSlugAvailable
      tags: [platform]
      summary: Whether a subdomain slug is valid and free to claim.
      parameters:
        - name: slug
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability of the requested slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlugAvailability"

  /platform/signup:
    post:
      operationId: platformSignup
      tags: [platform]
      summary: >-
        Self-serve onboarding: claim a central club + subdomain and create the
        first club admin. Provisions the tenant (central reads + player crosswalk)
        and opens an admin session. Gated by SIGNUP_MODE.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: Tenant provisioned and first admin created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResult"
        "400":
          description: Invalid slug, email, or password.
        "403":
          description: Signup is disabled, or the club isn't eligible.
        "409":
          description: The slug or club is already taken.

  /platform/auth/login:
    post:
      operationId: platformAdminLogin
      tags: [platformAdmin]
      summary: Authenticate a platform (super) admin and open a platform session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformLoginBody"
      responses:
        "200":
          description: Authenticated; platform session cookie set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAdmin"
        "400":
          description: Missing or malformed credentials.
        "401":
          description: Invalid email or password.

  /platform/auth/logout:
    post:
      operationId: platformAdminLogout
      tags: [platformAdmin]
      summary: Clear the current platform session.
      responses:
        "204":
          description: Session cleared.

  /platform/auth/me:
    get:
      operationId: getPlatformAdminMe
      tags: [platformAdmin]
      summary: The currently signed-in platform admin.
      responses:
        "200":
          description: The signed-in platform admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformAdmin"
        "401":
          description: Not authenticated.

  /platform/admin/tenants:
    get:
      operationId: listAllTenants
      tags: [platformAdmin]
      summary: Every tenant on the platform, with plan and admin count.
      responses:
        "200":
          description: All tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTenant"
        "401":
          description: Not authenticated.
    post:
      operationId: provisionTenantAsAdmin
      tags: [platformAdmin]
      summary: >-
        Concierge-provision a tenant from a central club (and optionally create its
        first club admin). Mirrors self-serve signup but run by a platform admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProvisionTenantBody"
      responses:
        "201":
          description: Tenant provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenant"
        "400":
          description: Invalid slug, club, email, or password.
        "401":
          description: Not authenticated.
        "409":
          description: The slug or club is already taken.

  /platform/admin/tenants/{id}:
    get:
      operationId: getAdminTenant
      tags: [platformAdmin]
      summary: One tenant's detail, including its club admins.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantDetail"
        "401":
          description: Not authenticated.
        "404":
          description: No such tenant.
    patch:
      operationId: updateAdminTenant
      tags: [platformAdmin]
      summary: Update a tenant's plan and/or custom domain.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenant"
        "400":
          description: Invalid plan or custom domain.
        "401":
          description: Not authenticated.
        "404":
          description: No such tenant.
        "409":
          description: That custom domain is already in use.

components:
  schemas:
    CardVideoJobInput:
      type: object
      required: [input, options]
      properties:
        # The opaque ShareCardInput JSON the client builds for the preview.
        # The union lives in the frontend; validated here by shape only.
        input:
          type: object
          additionalProperties: true
        # The opaque RenderOptions JSON (size, theme, brand, sponsors, template,
        # layout, photo, motion, duration, speed) — identical to the preview.
        options:
          type: object
          additionalProperties: true
        # Optional frame rate override (defaults to 30).
        fps:
          type: integer
          nullable: true
    CardVideoJob:
      type: object
      required: [id, status, progress]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [queued, rendering, encoding, done, error]
        # 0..1 overall progress (capture + encode).
        progress:
          type: number
        error:
          type: string
          nullable: true
        # Suggested download filename (set once the render succeeds).
        filename:
          type: string
          nullable: true
        # Size code of the rendered clip (e.g. "1x1", "4x5", "9x16").
        sizeCode:
          type: string
          nullable: true
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Player:
      type: object
      required: [id, surname, givenName, deceased]
      properties:
        id:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean
        gradesPlayed:
          type: ["string", "null"]
        totalGames:
          type: ["integer", "null"]
        totalRuns:
          type: ["integer", "null"]
        totalWickets:
          type: ["integer", "null"]
        premiershipsWon:
          type: ["integer", "null"]
        premiershipsCaptained:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        cardRole:
          type: ["string", "null"]
        cardRating:
          type: ["integer", "null"]

    PlayerImage:
      type: object
      required: [id, playerId, imageUrl, sortOrder, isDefault]
      properties:
        id:
          type: integer
        playerId:
          type: integer
        imageUrl:
          type: string
        sortOrder:
          type: integer
        isDefault:
          type: boolean

    PlayerImageInput:
      type: object
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
        makeDefault:
          type: boolean

    PlayerInput:
      type: object
      required: [surname, givenName]
      properties:
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean
        imageUrl:
          type: ["string", "null"]

    PlayerUpdate:
      type: object
      properties:
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean
        imageUrl:
          type: ["string", "null"]
        cardRole:
          type: ["string", "null"]
        cardRating:
          type: ["integer", "null"]

    PlayerDetail:
      type: object
      required: [id, surname, givenName, deceased, stats]
      properties:
        id:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean
        gradesPlayed:
          type: ["string", "null"]
        premiershipsWon:
          type: ["integer", "null"]
        premiershipsCaptained:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        cardRole:
          type: ["string", "null"]
        cardRating:
          type: ["integer", "null"]
        debutSeason:
          description: >-
            Inferred club debut season (start year, e.g. 2019 for 2019/20),
            derived from the match-data era. Only set for players whose entire
            record sits in the reliable scorecard era (zero pre-scorecard
            baseline games); null when the career predates reliable match data.
          type: ["integer", "null"]
        seasonsPlayed:
          description: >-
            Count of distinct match-era seasons the player has appeared in.
            Null when a debut season cannot be reliably inferred.
          type: ["integer", "null"]
        stats:
          type: array
          items:
            $ref: "#/components/schemas/Stat"
        premierships:
          type: array
          items:
            $ref: "#/components/schemas/PlayerPremiership"
        awards:
          type: array
          description: >-
            Published awards this player has won (one row per season won), used
            by the trading card.
          items:
            $ref: "#/components/schemas/PlayerAward"

    PlayerAward:
      type: object
      required: [key, title, season]
      properties:
        key:
          type: string
          description: Award key (awards.key).
        title:
          type: string
        season:
          type: integer
          description: Season (start year) the award was won.

    PlayerPremiership:
      type: object
      required: [id, year, grade, competition, isCaptain]
      properties:
        id:
          type: integer
        year:
          type: integer
        grade:
          type: string
        competition:
          type: string
        venue:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
        isCaptain:
          type: boolean

    Premiership:
      type: object
      required: [id, year, grade, competition, players]
      properties:
        id:
          type: integer
        year:
          type: integer
        grade:
          type: string
        competition:
          type: string
        venue:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        matchId:
          type: ["integer", "null"]
          description: |
            Id of the Grand Final scorecard match for this premiership's grade and
            season, when one exists in the match database; null otherwise.
        players:
          type: array
          items:
            $ref: "#/components/schemas/PremiershipPlayer"

    PremiershipPlayer:
      type: object
      required: [id, premiershipId, name, isCaptain]
      properties:
        id:
          type: integer
        premiershipId:
          type: integer
        playerId:
          type: ["integer", "null"]
        name:
          type: string
        isCaptain:
          type: boolean
        battingOrder:
          type: ["integer", "null"]

    PlayerListResponse:
      type: object
      required: [players, total, page, limit]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Stat:
      type: object
      required: [id, playerId, surname, givenName, grade]
      properties:
        id:
          type: integer
        playerId:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        grade:
          type: string
        season:
          type: ["integer", "null"]
        games:
          type: ["integer", "null"]
        innings:
          type: ["integer", "null"]
        notOuts:
          type: ["integer", "null"]
        runs:
          type: ["integer", "null"]
        batAvg:
          type: ["number", "null"]
        highScore:
          type: ["string", "null"]
        fifties:
          type: ["integer", "null"]
        hundreds:
          type: ["integer", "null"]
        wickets:
          type: ["integer", "null"]
        runsConceded:
          type: ["integer", "null"]
        bowlAvg:
          type: ["number", "null"]
        bestBowling:
          type: ["string", "null"]
        fiveWickets:
          type: ["integer", "null"]
        catches:
          type: ["integer", "null"]
        stumpings:
          type: ["integer", "null"]
        runOuts:
          type: ["integer", "null"]

    PlayerSeasonStat:
      type: object
      required: [grade, season]
      properties:
        grade:
          type: string
        season:
          description: >-
            Season start year (e.g. 2025 for 2025/26). Null for the
            pre-scorecard baseline row.
          type: ["integer", "null"]
        games:
          type: ["integer", "null"]
        innings:
          type: ["integer", "null"]
        notOuts:
          type: ["integer", "null"]
        runs:
          type: ["integer", "null"]
        batAvg:
          type: ["number", "null"]
        highScore:
          type: ["string", "null"]
        fifties:
          type: ["integer", "null"]
        hundreds:
          type: ["integer", "null"]
        wickets:
          type: ["integer", "null"]
        runsConceded:
          type: ["integer", "null"]
        bowlAvg:
          type: ["number", "null"]
        bestBowling:
          type: ["string", "null"]
        fiveWickets:
          type: ["integer", "null"]
        catches:
          type: ["integer", "null"]
        stumpings:
          type: ["integer", "null"]
        runOuts:
          type: ["integer", "null"]

    StatInput:
      type: object
      required: [playerId, grade]
      properties:
        playerId:
          type: integer
        grade:
          type: string
        season:
          type: integer
        games:
          type: integer
        innings:
          type: integer
        notOuts:
          type: integer
        runs:
          type: integer
        batAvg:
          type: number
        highScore:
          type: string
        fifties:
          type: integer
        hundreds:
          type: integer
        wickets:
          type: integer
        runsConceded:
          type: integer
        bowlAvg:
          type: number
        bestBowling:
          type: string
        fiveWickets:
          type: integer
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer

    StatUpdate:
      type: object
      properties:
        grade:
          type: string
        season:
          type: integer
        games:
          type: integer
        innings:
          type: integer
        notOuts:
          type: integer
        runs:
          type: integer
        batAvg:
          type: number
        highScore:
          type: string
        fifties:
          type: integer
        hundreds:
          type: integer
        wickets:
          type: integer
        runsConceded:
          type: integer
        bowlAvg:
          type: number
        bestBowling:
          type: string
        fiveWickets:
          type: integer
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer

    StatListResponse:
      type: object
      required: [stats, total, page, limit]
      properties:
        stats:
          type: array
          items:
            $ref: "#/components/schemas/Stat"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    GradeSummary:
      type: object
      required: [grade]
      properties:
        grade:
          type: string
        players:
          type: ["integer", "null"]
        games:
          type: ["integer", "null"]
        innings:
          type: ["integer", "null"]
        runs:
          type: ["integer", "null"]
        wickets:
          type: ["integer", "null"]
        catches:
          type: ["integer", "null"]
        stumpings:
          type: ["integer", "null"]
        runOuts:
          type: ["integer", "null"]

    Dashboard:
      type: object
      required: [totalPlayers, totalGames, totalRuns, totalWickets, gradesCount, topRunScorer, topWicketTaker, topFielder]
      properties:
        totalPlayers:
          type: integer
        totalGames:
          type: integer
        totalRuns:
          type: integer
        totalWickets:
          type: integer
        gradesCount:
          type: integer
        topRunScorer:
          $ref: "#/components/schemas/Player"
        topWicketTaker:
          $ref: "#/components/schemas/Player"
        topFielder:
          $ref: "#/components/schemas/Player"
        gradeSummaries:
          type: array
          items:
            $ref: "#/components/schemas/GradeSummary"

    SeasonLeader:
      type: object
      description: >-
        A single player's latest-season tally (runs or wickets), aggregated
        across all grades they played that season. Fill-in players
        (playerId >= 90000) are excluded.
      required: [playerId, givenName, surname, value]
      properties:
        playerId:
          type: integer
        givenName:
          type: string
        surname:
          type: string
        value:
          type: integer
          description: Runs (for top run scorers) or wickets (for top wicket takers).

    SeniorTotals:
      type: object
      required: [players, games, runs, wickets, grades]
      properties:
        players:
          type: integer
        games:
          type: integer
        runs:
          type: integer
        wickets:
          type: integer
        grades:
          type: integer

    SeasonOption:
      type: object
      description: A selectable season for the home-page season picker.
      required: [season, label]
      properties:
        season:
          type: integer
          description: Season start year (e.g. 2025).
        label:
          type: string
          description: Human label for the season (e.g. "2025/26").

    SeasonTopPerformers:
      type: object
      required: [season, seasonLabel, availableGrades, topRunScorers, topWicketTakers]
      properties:
        season:
          type: ["integer", "null"]
          description: >-
            Resolved season start year these leaders cover, or null for the
            all-time list.
        seasonLabel:
          type: ["string", "null"]
          description: Human label for the resolved season, or null for all-time.
        availableGrades:
          type: array
          items:
            type: string
          description: >-
            Grades that have records in the resolved season (or all grades ever
            played for the all-time list). Drives the grade chips.
        topRunScorers:
          type: array
          items:
            $ref: "#/components/schemas/SeasonLeader"
        topWicketTakers:
          type: array
          items:
            $ref: "#/components/schemas/SeasonLeader"

    SeniorOverview:
      type: object
      required:
        [latestSeason, latestSeasonLabel, availableSeasons, totals, recentMatches, topRunScorers, topWicketTakers]
      properties:
        availableSeasons:
          type: array
          items:
            $ref: "#/components/schemas/SeasonOption"
          description: >-
            Seasons that have results, newest-first, for the season picker.
        latestSeason:
          type: ["integer", "null"]
          description: Start year of the newest season with results, or null when none.
        latestSeasonLabel:
          type: ["string", "null"]
          description: Human label for the latest season (e.g. "2025/26").
        totals:
          $ref: "#/components/schemas/SeniorTotals"
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/MatchSummary"
          description: Most recent match per grade fielded in the latest season.
        topRunScorers:
          type: array
          items:
            $ref: "#/components/schemas/SeasonLeader"
        topWicketTakers:
          type: array
          items:
            $ref: "#/components/schemas/SeasonLeader"

    ImportRecord:
      type: object
      required: [id, filename, status, rowCount, importedAt, kind]
      properties:
        id:
          type: integer
        filename:
          type: string
        grade:
          type: ["string", "null"]
        season:
          type: ["integer", "null"]
        round:
          type: ["integer", "null"]
        kind:
          type: string
          description: "csv (whole-season) or match (per-match scorecard)"
        rowCount:
          type: integer
        status:
          type: string
        importedAt:
          type: string
          format: date-time

    CapSyncSummary:
      type: object
      required: [grade, category, updated, created]
      properties:
        grade:
          type: string
        category:
          $ref: "#/components/schemas/CapCategory"
        updated:
          type: integer
        created:
          type: integer

    CommitImportResult:
      type: object
      required: [id, filename, status, rowCount, importedAt, kind, capsSync]
      properties:
        id:
          type: integer
        filename:
          type: string
        grade:
          type: ["string", "null"]
        season:
          type: ["integer", "null"]
        round:
          type: ["integer", "null"]
        kind:
          type: string
        rowCount:
          type: integer
        status:
          type: string
        importedAt:
          type: string
          format: date-time
        capsSync:
          type: array
          items:
            $ref: "#/components/schemas/CapSyncSummary"
        reconcileMode:
          type: ["string", "null"]
          enum: [peel, add, null]
          description: Echoes the backfill reconcile mode applied, or null for a normal import.
        negativeWarnings:
          type: array
          description: Players whose baseline floored at zero during a peel (career total changed).
          items:
            $ref: "#/components/schemas/NegativeBaselineWarning"

    NameMatchCandidate:
      type: object
      required: [playerId, surname, givenName, reason]
      description: |
        A likely the-same-person suggestion for a scorecard/CSV name that has no
        exact roster match (first-name variant, nickname, or surname spelling).
        Surfaced for explicit admin confirmation; never linked automatically.
      properties:
        playerId:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        reason:
          type: string

    ImportPreviewPlayer:
      type: object
