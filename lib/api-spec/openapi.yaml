  /honour-display:
    get:
      operationId: getHonourDisplay
      tags: [honours]
      summary: Assembled Honour Boards Display bundle (boards + brand + settings)
      description: >-
        Assembles every honours category (premierships, centuries, five-wicket
        hauls, life members, club champions, captains, club records, awards)
        into the unified HonourBoard shape, alongside the club brand/theme and
        the display/kiosk settings. Drives the public Display page and kiosk.
      responses:
        "200":
          description: Honour boards, brand and display settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HonourDisplayBundle"

  /honour-display/kiosk:
    get:
      operationId: getKioskDisplay
      tags: [honours]
      summary: Public token-gated kiosk bundle for a fixed clubroom TV
      description: >-
        Returns the same assembled bundle as GET /honour-display, but is
        authenticated by a long-lived kiosk token (query param) instead of an
        admin session. Lets a wall-mounted TV / Raspberry Pi run the rotation
        without exposing the rest of the admin surface. The kioskToken field is
        omitted from the returned settings.
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: The kiosk access token issued by an admin.
      responses:
        "200":
          description: Honour boards, brand and display settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HonourDisplayBundle"
        "403":
          description: Missing, revoked, or invalid kiosk token

  /honour-display/kiosk-token:
    post:
      operationId: generateKioskToken
      tags: [honours]
      summary: Generate, set, or rotate the clubroom TV kiosk access token (admin)
      description: >-
        Issues a kiosk token, replacing any existing one (which immediately
        stops working). With a body `{ token }` the admin sets a custom code;
        otherwise a random one is generated. Returns the active token.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KioskTokenInput"
      responses:
        "200":
          description: The newly issued kiosk token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KioskTokenResponse"
    delete:
      operationId: revokeKioskToken
      tags: [honours]
      summary: Revoke the clubroom TV kiosk access token (admin)
      description: >-
        Clears the kiosk token so any existing kiosk link stops working.
      responses:
        "200":
          description: Token revoked (token is null)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KioskTokenResponse"

  /honour-display-settings:
    patch:
      operationId: updateHonourDisplaySettings
      tags: [honours]
