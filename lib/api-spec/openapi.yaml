            type: integer
          description: Significance tiers for games; first entry is the baseline lowest.
        runsTiers:
          type: array
          items:
            type: integer
          description: Significance tiers for runs; first entry is the baseline lowest.
        wicketsTiers:
          type: array
          items:
            type: integer
          description: Significance tiers for wickets; first entry is the baseline lowest.

    MilestoneBoardSettingsUpdate:
      type: object
      properties:
        displayMode:
          type: string
          enum: [recent, approaching, both]
        gamesThreshold:
          type: integer
          minimum: 1
        runsThreshold:
          type: integer
          minimum: 1
        wicketsThreshold:
          type: integer
          minimum: 1
        recencyWeeks:
          type: integer
          minimum: 1
        gamesTiers:
          type: array
          items:
            type: integer
            minimum: 1
        runsTiers:
          type: array
          items:
            type: integer
            minimum: 1
        wicketsTiers:
          type: array
          items:
            type: integer
            minimum: 1

    NavSurface:
      type: string
      enum: [senior_menu, junior_menu, junior_quick_links, admin_tiles]
      description: >-
        Which navigation surface an item belongs to: the senior top menu, the
        junior top menu, the junior dashboard quick-link cards, or the admin
        hub tiles.

    NavItem:
      type: object
      required:
        - id
        - surface
        - label
        - description
        - iconKey
        - target
        - isExternal
        - sortOrder
        - visible
      properties:
        id:
          type: integer
        surface:
          $ref: "#/components/schemas/NavSurface"
        label:
          type: string
          description: Display label / card title.
        description:
          type: string
          description: Card description (used by card surfaces only).
        iconKey:
          type: string
          description: Curated icon key mapped to a lucide icon on the client. Empty = none.
        target:
          type: string
          description: >-
            Internal route path (when isExternal is false) or full custom URL
            (when isExternal is true).
        isExternal:
          type: boolean
          description: When true the target is an external URL opened in a new tab.
        sortOrder:
          type: integer
        visible:
          type: boolean
          description: When false the item is hidden from the public site.

    NavItemInput:
      type: object
      required: [surface, label, target]
      properties:
        surface:
          $ref: "#/components/schemas/NavSurface"
        label:
          type: string
        description:
          type: string
        iconKey:
          type: string
        target:
          type: string
        isExternal:
          type: boolean
        sortOrder:
          type: integer
        visible:
          type: boolean

    NavItemUpdate:
      type: object
      properties:
        label:
          type: string
        description:
          type: string
        iconKey:
          type: string
        target:
          type: string
        isExternal:
          type: boolean
        sortOrder:
          type: integer
        visible:
          type: boolean

    NavReorderInput:
      type: object
      required: [surface, ids]
      properties:
        surface:
          $ref: "#/components/schemas/NavSurface"
        ids:
          type: array
          items:
            type: integer
          description: Item ids in their new display order.

    NavTargetOption:
      type: object
      required: [value, label, section]
      properties:
        value:
          type: string
          description: Internal route path stored in NavItem.target.
        label:
          type: string
        section:
          type: string
          enum: [senior, junior, admin]
          description: Which area of the site this target lives in.

    NavOptions:
      type: object
      required: [internalTargets, icons]
      properties:
        internalTargets:
          type: array
          items:
            $ref: "#/components/schemas/NavTargetOption"
        icons:
          type: array
          items:
            type: string
          description: Curated icon keys available in the icon picker.

    MatchDisplaySettings:
      type: object
      required:
        - defaultGrade
        - defaultSeasonMode
        - gradeOrder
        - roundOrder
      properties:
        defaultGrade:
          type: string
          description: Grade pre-selected on first load. Empty string = All grades.
        defaultSeasonMode:
          type: string
          enum: [latest, specific, all]
          description: >-
            How the default season is chosen: latest available season, a
            specific season, or all seasons.
        defaultSeason:
          type: integer
          nullable: true
          description: Specific season start-year used when defaultSeasonMode = specific.
        gradeOrder:
          type: array
          items:
            type: string
          description: >-
            Ordered grade names for the grade menu. Grades not listed fall back to
            the built-in seniority order, appended after the configured ones.
        roundOrder:
          type: string
          enum: [asc, desc]
          description: >-
            Within-season round direction: asc (round 1 first) or desc (latest
            round first). Season ordering always stays newest-first.

    MatchDisplaySettingsUpdate:
      type: object
      properties:
        defaultGrade:
          type: string
        defaultSeasonMode:
          type: string
          enum: [latest, specific, all]
        defaultSeason:
          type: integer
          nullable: true
        gradeOrder:
          type: array
          items:
            type: string
        roundOrder:
          type: string
          enum: [asc, desc]

    HonourBrand:
      type: object
      required:
        - name
        - shortName
        - monogram
        - primaryColour
        - secondaryColour
        - tertiaryColour
      properties:
        name:
          type: string
          description: Full club name.
        shortName:
          type: string
          description: Short club name / abbreviation.
        monogram:
          type: string
          description: 2-letter crest fallback (e.g. "HH").
        logoUrl:
          type: string
          nullable: true
          description: Club crest image URL; null falls back to the monogram.
        primaryColour:
          type: string
          description: Club primary colour (--club-primary), e.g. navy "#333F48".
        secondaryColour:
          type: string
          description: Club secondary / gold accent (--club-secondary), e.g. "#FBAC27".
        tertiaryColour:
          type: string
          description: Club tertiary colour (--club-accent).

    BoardSquadMember:
      type: object
      required:
        - name
        - isCaptain
      properties:
        name:
          type: string
        playerId:
          type: integer
          nullable: true
        isCaptain:
          type: boolean

    BoardEntryMeta:
      type: object
      properties:
        venue:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
        motm:
          type: string
          nullable: true
        captain:
          type: string
          nullable: true
        grade:
          type: string
          nullable: true
        parentGrade:
          type: string
          nullable: true
          description: P7 grade-filter key (e.g. "A", "Female A", "U21 Colts").
        competition:
          type: string
          nullable: true
        rank:
          type: integer
          nullable: true
          description: 1-based rank for ranked list boards (points, win counts).

    BoardEntry:
      type: object
      required:
        - season
        - primaryText
      properties:
        season:
          type: string
          description: Season / year label, e.g. "2024/25" (may be empty).
        primaryText:
          type: string
          description: Name / captain / record type.
        detail:
          type: string
          nullable: true
          description: 'e.g. "147* v Mandurah", "def. Pinjarra", "642 pts".'
        playerId:
          type: integer
          nullable: true
          description: Link to player profile when known.
        matchId:
          type: integer
          nullable: true
          description: Link to match scorecard when derivable (P7 grand finals).
        meta:
          $ref: "#/components/schemas/BoardEntryMeta"
        squad:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/BoardSquadMember"
          description: Premiership squad (premiership_players) for P7 "View team".

    BoardDisplay:
      type: object
      description: >-
        Resolved per-board display config the server stamps onto every board
        (defaults merged with the admin's per-board overrides). Drives the
        display + kiosk render.
      required:
        - columns
        - transition
        - fit
      properties:
        columns:
          type: integer
          minimum: 1
          maximum: 3
          description: Column count for multi-column list flow (1 = single column).
        transition:
          type: string
          enum:
            - scroll
            - slide
            - wrap
          description: >-
            Kiosk fill mode — continuous credit-scroll, paged slideshow, or
            wrap (grid boards split into side-by-side blocks to fit one screen).
        fit:
          type: boolean
          description: Fill the full screen width on the kiosk (drop the narrow cap).
        wrapBlocks:
          type: integer
          minimum: 2
          maximum: 4
          description: >-
            For the "wrap" fill mode on grid boards: how many side-by-side
            year-blocks to split the rows into (2..4).

    HonourBackground:
      type: object
      description: >-
        A board / page background source. kind "none" clears any inherited
        image; "url" is an image URL or uploaded object path; "texture" is a
        built-in CSS texture id.
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - none
            - url
            - texture
        value:
          type: string
          nullable: true

    BoardDisplayConfig:
      type: object
      description: >-
        Admin per-board override (all fields optional; unset falls back to the
        board's natural default). Stored keyed by board id in settings.boardConfigs.
      properties:
        columns:
          type: integer
          minimum: 1
          maximum: 3
        transition:
          type: string
          enum:
            - scroll
            - slide
            - wrap
        fit:
          type: boolean
        wrapBlocks:
          type: integer
          minimum: 2
          maximum: 4
          description: Side-by-side block count for the "wrap" fill mode (grid boards).
        skin:
          type: string
          nullable: true
          description: >-
            Per-board skin override (built-in id p1..p9 or "custom:<uuid>").
            Unset = use the club-wide skin.
        footnote:
          type: string
          nullable: true
          description: Free-text footnote rendered under the board.
        heading:
          type: string
          nullable: true
          description: Override the board's heading/title.
        subtitle:
          type: string
          nullable: true
          description: Override the board's subtitle.
        textSize:
          type: string
          enum:
            - sm
            - md
            - lg
          description: Per-board text scale.
        density:
          type: string
          enum:
            - comfortable
            - compact
          description: Per-board row density.
        font:
          type: string
          nullable: true
          description: Per-board title font stack (overrides skin / default font).
        logo:
          type: boolean
          description: Show the club crest in this board's header (default true).
        background:
          allOf:
            - $ref: "#/components/schemas/HonourBackground"
          nullable: true
          description: Per-board background image.
        gridColumns:
          type: array
          nullable: true
          items:
            type: string
          description: >-
            Ordered column keys for grid-capable boards (offices, award keys,
            grades). Non-empty switches the board into its season-grid layout.

    BoardColumn:
      type: object
      description: A single column of a composite 'columns' layout board.
      required:
        - heading
        - entries
      properties:
        heading:
          type: string
        entries:
          type: array
          items:
            $ref: "#/components/schemas/BoardEntry"

    CompositeColumnRef:
      type: object
      description: One column of a composite board — a reference to an existing list board.
      required:
        - boardId
        - heading
      properties:
        boardId:
          type: string
          description: Id of the source list-layout board to pull entries from.
        heading:
          type: string
          description: Column heading shown above the source board's entries.

    CompositeDef:
      type: object
      description: >-
        Admin-defined composite board that places several existing list boards
        side-by-side as columns (like the club's physical honour board).
      required:
        - id
        - title
        - seasonAligned
        - columns
      properties:
        id:
          type: string
          description: Stable composite id, e.g. "composite:<uuid>" (never reused).
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        seasonAligned:
          type: boolean
          description: >-
            When true and every source column is season-based, the server emits
            a leading SEASON column and aligns rows by season; otherwise it
            falls back to free side-by-side columns.
        columns:
          type: array
          items:
            $ref: "#/components/schemas/CompositeColumnRef"
        transition:
          type: string
          enum:
            - scroll
            - slide
          nullable: true
        fit:
          type: boolean
          nullable: true

    DisplayBoard:
      type: object
      required:
        - id
        - category
        - layout
        - title
        - entries
        - display
      properties:
        id:
          type: string
          description: Stable board id (also the kiosk sequence key).
        category:
          type: string
          description: Free-text board category used for grouping/labelling.
        layout:
          type: string
          enum:
            - premiership
            - teamOfDecade
            - list
            - columns
            - grid
          description: Natural render layout for this board (skin only changes the look).
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        entries:
          type: array
          items:
            $ref: "#/components/schemas/BoardEntry"
        columns:
          type: array
          nullable: true
          description: Side-by-side columns for the 'columns' layout (else null).
          items:
            $ref: "#/components/schemas/BoardColumn"
        grid:
          allOf:
            - $ref: "#/components/schemas/BoardGrid"
          nullable: true
          description: Season-grid matrix for the 'grid' layout (else null).
        skin:
          type: string
          nullable: true
          description: >-
            Effective per-board skin (resolved server-side from the board config
            or custom-grid definition); null = use the club-wide skin.
        footnote:
          type: string
          nullable: true
          description: Free-text footnote rendered under the board.
        display:
          $ref: "#/components/schemas/BoardDisplay"

    BoardGridEntry:
      type: object
      description: One name within a grid cell (a cell may hold several, e.g. joint holders).
      required:
        - text
      properties:
        text:
          type: string
        playerId:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
          description: Small marker/caption shown with the name (e.g. "Premiers", "*").

    BoardGridCell:
      type: object
      description: A single cell of a season grid (zero or more names).
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/BoardGridEntry"

    BoardGridRow:
      type: object
      description: One row of a season grid — a leading heading plus a cell per column.
      required:
        - heading
        - cells
      properties:
        heading:
          type: string
          description: Leading-column label for the row (e.g. the season).
        cells:
          type: array
          items:
            $ref: "#/components/schemas/BoardGridCell"

    BoardGrid:
      type: object
      description: >-
        A reusable season-grid matrix — rows (usually seasons) by admin-chosen
        columns (offices, awards, grades). Falls back to a list/columns layout
        when the board has no configured columns.
      required:
        - rowHeading
        - columnHeadings
        - rows
      properties:
        rowHeading:
          type: string
          description: Heading for the leading column (e.g. "Season").
        columnHeadings:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            $ref: "#/components/schemas/BoardGridRow"

    GridColumnOption:
      type: object
      description: An available column an admin can add to a grid-capable board.
      required:
        - key
        - label
      properties:
        key:
          type: string
        label:
          type: string

    GridCatalogEntry:
      type: object
      description: >-
        A grid-capable board and the columns an admin can choose from for its
        season-grid layout. Drives the admin column pickers.
      required:
        - id
        - title
        - options
      properties:
        id:
          type: string
          description: Board id this configures (matches a board / boardConfigs key).
        title:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/GridColumnOption"

    CustomGridColumn:
      type: object
      description: >-
        One column of an admin-built custom grid board. `source` selects where
        the column's cells come from; `manual` columns are typed by the admin.
      required:
        - key
        - label
        - source
      properties:
        key:
          type: string
          description: Stable per-column id (unique within the board).
        label:
          type: string
          description: Column heading text.
        source:
          type: string
          enum:
            - office
            - award
            - grade
            - premiership
            - manual
          description: >-
            Data source: an office (committee role), an award, a grade's
            captains, premierships by grade, or free manual entry.
        sourceKey:
          type: string
          nullable: true
          description: >-
            The specific office role / award key / grade for the chosen source
            (ignored for manual columns).
        manualValues:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: >-
            For manual columns: season label ("2024/25") → cell text. Other
            sources ignore this.

    CustomGridDef:
      type: object
      description: >-
        An admin-built season-grid board: season rows × freely chosen columns
        drawn from any data source (or typed manually). Carries its own look
        (skin), fill mode and footnote.
      required:
        - id
        - title
        - columns
      properties:
        id:
          type: string
          description: Stable id, "grid:<uuid>" (validated server-side; never reused).
        title:
          type: string
        subtitle:
          type: string
          nullable: true
        footnote:
          type: string
          nullable: true
        skin:
          type: string
          nullable: true
          description: Per-board skin (p1..p9 or "custom:<uuid>"); null = club-wide.
        seasonFrom:
          type: integer
          nullable: true
          description: First season start-year to show (rows run newest→oldest).
        seasonTo:
          type: integer
          nullable: true
          description: >-
            Last season start-year to show; rows beyond the data are left blank
            so the board has room to grow (pre-listed future seasons).
        fillMode:
          type: string
          enum:
            - scroll
            - slide
            - wrap
          nullable: true
        wrapBlocks:
          type: integer
          minimum: 2
          maximum: 4
          nullable: true
        columns:
          type: array
          items:
            $ref: "#/components/schemas/CustomGridColumn"

    KioskAd:
      type: object
      description: >-
        A full-screen advertising creative the admin can place between boards in
        the kiosk rotation (distinct from the club sponsor library).
      required:
        - id
        - name
        - imageUrl
      properties:
        id:
          type: string
          description: Stable id, "ad:<uuid>".
        name:
          type: string
        imageUrl:
          type: string
          description: Full-screen ad image URL (or uploaded object path).

    HonourSkin:
      type: object
      description: An admin-authored skin/theme applied via inline CSS variables.
      required:
        - id
        - name
        - background
        - boardBg
        - ink
        - muted
        - accent
        - accentInk
        - font
      properties:
        id:
          type: string
          description: Stable skin id, e.g. "custom:<uuid>".
        name:
          type: string
        background:
          type: string
          description: Page backdrop (colour or gradient).
        boardBg:
          type: string
          description: Board surface colour.
        ink:
          type: string
          description: Primary text colour.
        muted:
          type: string
          description: Secondary text colour.
        accent:
          type: string
          description: Gold / accent colour.
        accentInk:
          type: string
          description: Text colour on the accent.
        font:
          type: string
          description: Title font stack.
        backgroundImage:
          allOf:
            - $ref: "#/components/schemas/HonourBackground"
          nullable: true

    HonourColourOverrides:
      type: object
      description: >-
        Club-wide colour overrides layered on top of the active skin. Each is
        optional; an unset/empty value restores the skin's own colour.
      properties:
        background:
          type: string
          nullable: true
        text:
          type: string
          nullable: true
        accent:
          type: string
          nullable: true

    HonourDisplaySettings:
      type: object
      required:
        - defaultTemplate
        - kioskSequence
        - kioskDwellMs
        - kioskScrollSpeed
        - kioskEndHoldMs
        - kioskSponsorStrip
        - kioskSponsorSlides
        - kioskSponsorSlideEvery
        - boardConfigs
        - composites
      properties:
        defaultTemplate:
          type: string
          description: >-
            The single club-wide skin every board renders in: a built-in id
            (p1..p8) or an admin skin id ("custom:<uuid>").
        kioskSequence:
          type: array
          items:
            type: string
          description: Ordered board ids the kiosk rotates through. Empty = all boards.
        kioskDwellMs:
          type: integer
          description: Hold (ms) on each board before any credit-scroll begins.
        kioskScrollSpeed:
          type: integer
          description: Credit-scroll speed (px/sec) for tall boards.
        kioskEndHoldMs:
          type: integer
          description: Hold (ms) at the bottom of a board before advancing.
        kioskSponsorStrip:
          type: boolean
          description: >-
            Embed a persistent "proudly supported by" sponsor-logo strip on every
            board screen. Only renders when there are active sponsors.
        kioskSponsorSlides:
          type: boolean
          description: >-
            Rotate a full-screen sponsor slide in after every N boards. Only
            renders when there are active sponsors.
        kioskSponsorSlideEvery:
          type: integer
          minimum: 1
          description: Insert a sponsor slide after this many boards (when slides on).
        kioskSponsorSlideStyle:
          type: string
          enum:
            - grid
            - single
          description: >-
            Sponsor slide style — one grid of every sponsor, or one large
            sponsor per slide rotating through them.
        kioskSponsorIds:
          type: array
          items:
            type: integer
          description: >-
            Which sponsors appear on the kiosk (subset of the active sponsors).
            Empty = all active sponsors.
        kioskAds:
          type: array
          description: Admin-uploaded full-screen ad creatives for the kiosk.
          items:
            $ref: "#/components/schemas/KioskAd"
        kioskToken:
          type: string
          nullable: true
          description: >-
            Long-lived read-only kiosk access token (admin bundle only; null
            when no link has been issued). Omitted from the public kiosk feed.
        boardConfigs:
          type: object
          description: Per-board display overrides keyed by board id.
          additionalProperties:
            $ref: "#/components/schemas/BoardDisplayConfig"
        composites:
          type: array
          description: Admin-defined composite 'columns' boards.
          items:
            $ref: "#/components/schemas/CompositeDef"
        customGrids:
          type: array
          description: Admin-built custom season-grid boards.
          items:
            $ref: "#/components/schemas/CustomGridDef"
        skins:
          type: array
          description: Admin-authored skins/themes (built-in p1..p9 not listed).
          items:
            $ref: "#/components/schemas/HonourSkin"
        colourOverrides:
          $ref: "#/components/schemas/HonourColourOverrides"
        defaultFont:
          type: string
          nullable: true
          description: Club-wide default title font stack (null = the skin's font).

    KioskTokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          nullable: true
          description: The active kiosk token, or null when revoked / not issued.

    KioskTokenInput:
      type: object
      description: >-
        Optional body for generating a kiosk token. Provide `token` to set a
        custom code (3–40 chars, letters/numbers/hyphens); omit it for a random
        one.
      properties:
        token:
          type: string
          nullable: true
          description: Custom kiosk code, or null/omitted to auto-generate.

    HonourDisplaySettingsUpdate:
      type: object
      properties:
        defaultTemplate:
          type: string
        kioskSequence:
          type: array
          items:
            type: string
        kioskDwellMs:
          type: integer
        kioskScrollSpeed:
          type: integer
        kioskEndHoldMs:
          type: integer
        kioskSponsorStrip:
          type: boolean
        kioskSponsorSlides:
          type: boolean
        kioskSponsorSlideEvery:
          type: integer
          minimum: 1
        kioskSponsorSlideStyle:
          type: string
          enum:
            - grid
            - single
        kioskSponsorIds:
          type: array
          items:
            type: integer
        kioskAds:
          type: array
          items:
            $ref: "#/components/schemas/KioskAd"
        boardConfigs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/BoardDisplayConfig"
        composites:
          type: array
          items:
            $ref: "#/components/schemas/CompositeDef"
        customGrids:
          type: array
          items:
            $ref: "#/components/schemas/CustomGridDef"
