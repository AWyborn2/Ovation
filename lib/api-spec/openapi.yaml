openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Halls Head Cricket Club Stats API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player operations
  - name: stats
    description: Per-grade stats operations
  - name: grades
    description: Grade summary operations
  - name: imports
    description: CSV import operations
  - name: caps
    description: A Grade Cap Register operations
  - name: lifeMembers
    description: Life Members operations
  - name: auth
    description: Authentication operations
  - name: admins
    description: Admin user operations
  - name: honourBoards
    description: Honour board configuration and overrides
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name
        - name: grade
          in: query
          schema:
            type: string
          description: Filter by grade
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [games, runs, wickets, average, name]
          description: Sort field
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player with all grade stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "404":
          description: Not found
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stats:
    get:
      operationId: listStats
      tags: [stats]
      summary: List per-grade stats records
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: grade
          in: query
          schema:
            type: string
        - name: playerId
          in: query
          schema:
            type: integer
        - name: season
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [games, runs, wickets, batAvg, bowlAvg, catches, name, season]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of stat records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatListResponse"
    post:
      operationId: createStat
      tags: [stats]
      summary: Create a stat record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"

  /stats/{id}:
    get:
      operationId: getStat
      tags: [stats]
      summary: Get a stat record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stat record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"
        "404":
          description: Not found
    patch:
      operationId: updateStat
      tags: [stats]
      summary: Update a stat record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatUpdate"
      responses:
        "200":
          description: Updated stat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"
        "404":
          description: Not found
    delete:
      operationId: deleteStat
      tags: [stats]
      summary: Delete a stat record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List all grades with summary stats
      responses:
        "200":
          description: List of grade summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeSummary"

  /grades/{grade}/leaderboard:
    get:
      operationId: getGradeLeaderboard
      tags: [grades]
      summary: Get leaderboard for a specific grade
      parameters:
        - name: grade
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stat"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [grades]
      summary: Club-wide dashboard stats
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /imports:
    get:
      operationId: listImports
      tags: [imports]
      summary: List past CSV imports
      responses:
        "200":
          description: List of imports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportRecord"

  /imports/playcricket-csv:
    post:
      operationId: uploadPlaycricketCsv
      tags: [imports]
      summary: Upload a PlayCricket CSV for preview
      description: |
        Upload a PlayCricket "Combined Batting/Bowling/Fielding" CSV for a
        single grade and season. Server parses the file, creates a pending
        import row, and returns a preview of what will be applied. Nothing
        is written to the snapshot/aggregate tables until `commitImport` is
        called. Generated clients should treat the file as `Blob`; the
        cricket-club frontend posts FormData via raw `fetch` against this
        route.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, season]
              properties:
                file:
                  type: string
                  format: binary
                  description: The PlayCricket CSV export
                season:
                  type: integer
                  description: Starting year of the season (e.g. 2025 for 2025/26)
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreview"
        "400":
          description: Invalid file or season

  /imports/{id}/commit:
    post:
      operationId: commitImport
      tags: [imports]
      summary: Commit a previously-previewed import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Committed import record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRecord"
        "404":
          description: Not found

  /imports/{id}:
    delete:
      operationId: deleteImport
      tags: [imports]
      summary: Delete an import and re-derive aggregates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /records:
    get:
      operationId: getRecords
      tags: [grades]
      summary: Club all-time records
      responses:
        "200":
          description: All-time records across all grades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubRecords"

  /caps:
    get:
      operationId: listCaps
      tags: [caps]
      summary: List all A Grade cap register entries
      description: Full A Grade cap register in chronological cap-number order.
      responses:
        "200":
          description: Cap register
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapEntry"
    post:
      operationId: createCap
      tags: [caps]
      summary: Create a cap register entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapEntry"

  /caps/{id}:
    patch:
      operationId: updateCap
      tags: [caps]
      summary: Update a cap register entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteCap
      tags: [caps]
      summary: Delete a cap register entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /life-members:
    get:
      operationId: listLifeMembers
      tags: [lifeMembers]
      summary: List all life members
      description: |
        Full list of Life Members, ordered by induction year ascending then
        name alphabetically. Playing members include their aggregated career
        stats and grades-played list inline so the page can render without a
        second round-trip.
      responses:
        "200":
          description: Life members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeMember"
    post:
      operationId: createLifeMember
      tags: [lifeMembers]
      summary: Create a life member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeMember"

  /life-members/{id}:
    patch:
      operationId: updateLifeMember
      tags: [lifeMembers]
      summary: Update a life member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeMember"
        "404":
          description: Not found
    delete:
      operationId: deleteLifeMember
      tags: [lifeMembers]
      summary: Delete a life member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /premierships:
    get:
      operationId: listPremierships
      tags: [grades]
      summary: List all premierships with rosters
      responses:
        "200":
          description: List of premiership records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Premiership"
    post:
      operationId: createPremiership
      tags: [grades]
      summary: Create a premiership record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PremiershipInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Premiership"

  /premierships/{id}:
    patch:
      operationId: updatePremiership
      tags: [grades]
      summary: Update a premiership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PremiershipUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Premiership"
        "404":
          description: Not found
    delete:
      operationId: deletePremiership
      tags: [grades]
      summary: Delete a premiership
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /players/{id}/merge:
    post:
      operationId: mergePlayer
      tags: [players]
      summary: Merge a duplicate player into a keeper
      description: |
        Reassign all stats, premiership squad rows, cap register rows and life
        member rows from the duplicate (`id` in the path) into the keeper
        (`keeperId` in the body), then delete the duplicate and recompute
        aggregates for all affected grades inside a single DB transaction.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerMergeRequest"
      responses:
        "200":
          description: Keeper player after merge
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Player not found

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in as an admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "204":
          description: Logged out

  /auth/me:
    get:
      operationId: getCurrentAdmin
      tags: [auth]
      summary: Get the currently signed-in admin
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "401":
          description: Not signed in

  /admins:
    get:
      operationId: listAdmins
      tags: [admins]
      summary: List all admin users
      responses:
        "200":
          description: List of admins
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Admin"
    post:
      operationId: createAdmin
      tags: [admins]
      summary: Create a new admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminInput"
      responses:
        "201":
          description: Created admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"

  /admins/{id}:
    patch:
      operationId: updateAdmin
      tags: [admins]
      summary: Update an admin (display name, username, password)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdate"
      responses:
        "200":
          description: Updated admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admin"
        "404":
          description: Not found
    delete:
      operationId: deleteAdmin
      tags: [admins]
      summary: Delete an admin
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "400":
          description: Cannot delete the last remaining admin
        "404":
          description: Not found

  /honour-boards:
    get:
      operationId: listHonourBoards
      tags: [honourBoards]
      summary: List all honour board definitions
      responses:
        "200":
          description: Honour board definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HonourBoard"
    post:
      operationId: createHonourBoard
      tags: [honourBoards]
      summary: Create a honour board definition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HonourBoardInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HonourBoard"

  /honour-boards/{key}:
    patch:
      operationId: updateHonourBoard
      tags: [honourBoards]
      summary: Update an honour board definition
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HonourBoardUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HonourBoard"
        "404":
          description: Not found
    delete:
      operationId: deleteHonourBoard
      tags: [honourBoards]
      summary: Soft-delete an honour board
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /honour-boards/{key}/overrides:
    get:
      operationId: listHonourBoardOverrides
      tags: [honourBoards]
      summary: List overrides for a single honour board
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Override rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HonourBoardOverride"
    post:
      operationId: upsertHonourBoardOverride
      tags: [honourBoards]
      summary: Create or update an override for (board, player)
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HonourBoardOverrideInput"
      responses:
        "200":
          description: Upserted override
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HonourBoardOverride"

  /honour-boards/{key}/overrides/{playerId}:
    delete:
      operationId: deleteHonourBoardOverride
      tags: [honourBoards]
      summary: Remove an override
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: playerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Player:
      type: object
      required: [id, surname, givenName, deceased]
      properties:
        id:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean
        gradesPlayed:
          type: ["string", "null"]
        totalGames:
          type: ["integer", "null"]
        totalRuns:
          type: ["integer", "null"]
        totalWickets:
          type: ["integer", "null"]
        premiershipsWon:
          type: ["integer", "null"]
        premiershipsCaptained:
          type: ["integer", "null"]

    PlayerInput:
      type: object
      required: [surname, givenName]
      properties:
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean

    PlayerUpdate:
      type: object
      properties:
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean

    PlayerDetail:
      type: object
      required: [id, surname, givenName, deceased, stats]
      properties:
        id:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        deceased:
          type: boolean
        gradesPlayed:
          type: ["string", "null"]
        premiershipsWon:
          type: ["integer", "null"]
        premiershipsCaptained:
          type: ["integer", "null"]
        stats:
          type: array
          items:
            $ref: "#/components/schemas/Stat"
        premierships:
          type: array
          items:
            $ref: "#/components/schemas/PlayerPremiership"

    PlayerPremiership:
      type: object
      required: [id, year, grade, competition, isCaptain]
      properties:
        id:
          type: integer
        year:
          type: integer
        grade:
          type: string
        competition:
          type: string
        venue:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
        isCaptain:
          type: boolean

    Premiership:
      type: object
      required: [id, year, grade, competition, players]
      properties:
        id:
          type: integer
        year:
          type: integer
        grade:
          type: string
        competition:
          type: string
        venue:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        players:
          type: array
          items:
            $ref: "#/components/schemas/PremiershipPlayer"

    PremiershipPlayer:
      type: object
      required: [id, premiershipId, name, isCaptain]
      properties:
        id:
          type: integer
        premiershipId:
          type: integer
        playerId:
          type: ["integer", "null"]
        name:
          type: string
        isCaptain:
          type: boolean
        battingOrder:
          type: ["integer", "null"]

    PlayerListResponse:
      type: object
      required: [players, total, page, limit]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Stat:
      type: object
      required: [id, playerId, surname, givenName, grade]
      properties:
        id:
          type: integer
        playerId:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        grade:
