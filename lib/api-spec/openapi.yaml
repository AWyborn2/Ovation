        season:
          type: integer
        games:
          type: integer
        innings:
          type: integer
        notOuts:
          type: integer
        runs:
          type: integer
        batAvg:
          type: number
        highScore:
          type: string
        fifties:
          type: integer
        hundreds:
          type: integer
        wickets:
          type: integer
        runsConceded:
          type: integer
        bowlAvg:
          type: number
        bestBowling:
          type: string
        fiveWickets:
          type: integer
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer

    StatListResponse:
      type: object
