openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Halls Head Cricket Club Stats API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player operations
  - name: stats
    description: Per-grade stats operations
  - name: grades
    description: Grade summary operations
  - name: imports
    description: CSV import operations
  - name: caps
    description: A Grade Cap Register operations
  - name: lifeMembers
    description: Life Members operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name
        - name: grade
          in: query
          schema:
            type: string
          description: Filter by grade
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [games, runs, wickets, average, name]
          description: Sort field
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player with all grade stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "404":
          description: Not found
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stats:
    get:
      operationId: listStats
      tags: [stats]
      summary: List per-grade stats records
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: grade
          in: query
          schema:
            type: string
        - name: playerId
          in: query
          schema:
            type: integer
        - name: season
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [games, runs, wickets, batAvg, bowlAvg, catches, name, season]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of stat records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatListResponse"
    post:
      operationId: createStat
      tags: [stats]
      summary: Create a stat record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"

  /stats/{id}:
    get:
      operationId: getStat
      tags: [stats]
      summary: Get a stat record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stat record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"
        "404":
          description: Not found
    patch:
      operationId: updateStat
      tags: [stats]
      summary: Update a stat record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatUpdate"
      responses:
        "200":
          description: Updated stat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"
        "404":
          description: Not found
    delete:
      operationId: deleteStat
      tags: [stats]
      summary: Delete a stat record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List all grades with summary stats
      responses:
        "200":
          description: List of grade summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeSummary"

  /grades/{grade}/leaderboard:
    get:
      operationId: getGradeLeaderboard
      tags: [grades]
      summary: Get leaderboard for a specific grade
      parameters:
        - name: grade
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stat"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [grades]
      summary: Club-wide dashboard stats
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /imports:
    get:
      operationId: listImports
      tags: [imports]
      summary: List past CSV imports
      responses:
        "200":
          description: List of imports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportRecord"

  /imports/playcricket-csv:
    post:
      operationId: uploadPlaycricketCsv
      tags: [imports]
      summary: Upload a PlayCricket CSV for preview
      description: |
        Upload a PlayCricket "Combined Batting/Bowling/Fielding" CSV for a
        single grade and season. Server parses the file, creates a pending
        import row, and returns a preview of what will be applied. Nothing
        is written to the snapshot/aggregate tables until `commitImport` is
        called. Generated clients should treat the file as `Blob`; the
        cricket-club frontend posts FormData via raw `fetch` against this
        route.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, season]
              properties:
                file:
                  type: string
                  format: binary
                  description: The PlayCricket CSV export
                season:
                  type: integer
                  description: Starting year of the season (e.g. 2025 for 2025/26)
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreview"
        "400":
          description: Invalid file or season

  /imports/{id}/commit:
    post:
      operationId: commitImport
      tags: [imports]
      summary: Commit a previously-previewed import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Committed import record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportRecord"
        "404":
          description: Not found

  /imports/{id}:
    delete:
      operationId: deleteImport
      tags: [imports]
      summary: Delete an import and re-derive aggregates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /records:
    get:
      operationId: getRecords
      tags: [grades]
      summary: Club all-time records
      responses:
        "200":
          description: All-time records across all grades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubRecords"

  /caps:
    get:
      operationId: listCaps
      tags: [caps]
      summary: List all A Grade cap register entries
      description: Full A Grade cap register in chronological cap-number order.
      responses:
        "200":
          description: Cap register
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapEntry"
    post:
      operationId: createCap
      tags: [caps]
      summary: Create a cap register entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapEntry"

  /caps/{id}:
    patch:
      operationId: updateCap
      tags: [caps]
      summary: Update a cap register entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapEntryUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapEntry"
        "404":
          description: Not found
    delete:
      operationId: deleteCap
      tags: [caps]
      summary: Delete a cap register entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /life-members:
    get:
      operationId: listLifeMembers
      tags: [lifeMembers]
      summary: List all life members
      description: |
        Full list of Life Members, ordered by induction year ascending then
        name alphabetically. Playing members include their aggregated career
        stats and grades-played list inline so the page can render without a
        second round-trip.
      responses:
        "200":
          description: Life members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LifeMember"
    post:
      operationId: createLifeMember
      tags: [lifeMembers]
      summary: Create a life member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeMemberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeMember"

  /life-members/{id}:
    patch:
      operationId: updateLifeMember
      tags: [lifeMembers]
      summary: Update a life member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifeMemberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifeMember"
        "404":
          description: Not found
    delete:
      operationId: deleteLifeMember
      tags: [lifeMembers]
      summary: Delete a life member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /premierships:
    get:
      operationId: listPremierships
      tags: [grades]
      summary: List all premierships with rosters
      responses:
        "200":
          description: List of premiership records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Premiership"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Player:
      type: object
      required: [id, surname, givenName]
      properties:
        id:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        gradesPlayed:
          type: ["string", "null"]
        totalGames:
          type: ["integer", "null"]
        totalRuns:
          type: ["integer", "null"]
        totalWickets:
          type: ["integer", "null"]
        premiershipsWon:
          type: ["integer", "null"]
        premiershipsCaptained:
          type: ["integer", "null"]

    PlayerInput:
      type: object
      required: [surname, givenName]
      properties:
        surname:
          type: string
        givenName:
          type: string

    PlayerUpdate:
      type: object
      properties:
        surname:
          type: string
        givenName:
          type: string

    PlayerDetail:
      type: object
      required: [id, surname, givenName, stats]
      properties:
        id:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        gradesPlayed:
          type: ["string", "null"]
        premiershipsWon:
          type: ["integer", "null"]
        premiershipsCaptained:
          type: ["integer", "null"]
        stats:
          type: array
          items:
            $ref: "#/components/schemas/Stat"
        premierships:
          type: array
          items:
            $ref: "#/components/schemas/PlayerPremiership"

    PlayerPremiership:
      type: object
      required: [id, year, grade, competition, isCaptain]
      properties:
        id:
          type: integer
        year:
          type: integer
        grade:
          type: string
        competition:
          type: string
        venue:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
        isCaptain:
          type: boolean

    Premiership:
      type: object
      required: [id, year, grade, competition, players]
      properties:
        id:
          type: integer
        year:
          type: integer
        grade:
          type: string
        competition:
          type: string
        venue:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        players:
          type: array
          items:
            $ref: "#/components/schemas/PremiershipPlayer"

    PremiershipPlayer:
      type: object
      required: [id, premiershipId, name, isCaptain]
      properties:
        id:
          type: integer
        premiershipId:
          type: integer
        playerId:
          type: ["integer", "null"]
        name:
          type: string
        isCaptain:
          type: boolean
        battingOrder:
          type: ["integer", "null"]

    PlayerListResponse:
      type: object
      required: [players, total, page, limit]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/Player"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Stat:
      type: object
      required: [id, playerId, surname, givenName, grade]
      properties:
        id:
          type: integer
        playerId:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        grade:
          type: string
        season:
          type: ["integer", "null"]
        games:
          type: ["integer", "null"]
        innings:
          type: ["integer", "null"]
        notOuts:
          type: ["integer", "null"]
        runs:
          type: ["integer", "null"]
        batAvg:
          type: ["number", "null"]
        highScore:
          type: ["string", "null"]
        fifties:
          type: ["integer", "null"]
        hundreds:
          type: ["integer", "null"]
        wickets:
          type: ["integer", "null"]
        runsConceded:
          type: ["integer", "null"]
        bowlAvg:
          type: ["number", "null"]
        bestBowling:
          type: ["string", "null"]
        fiveWickets:
          type: ["integer", "null"]
        catches:
          type: ["integer", "null"]
        stumpings:
          type: ["integer", "null"]
        runOuts:
          type: ["integer", "null"]

    StatInput:
      type: object
      required: [playerId, grade]
      properties:
        playerId:
          type: integer
        grade:
          type: string
        season:
          type: integer
        games:
          type: integer
        innings:
          type: integer
        notOuts:
          type: integer
        runs:
          type: integer
        batAvg:
          type: number
        highScore:
          type: string
        fifties:
          type: integer
        hundreds:
          type: integer
        wickets:
          type: integer
        runsConceded:
          type: integer
        bowlAvg:
          type: number
        bestBowling:
          type: string
        fiveWickets:
          type: integer
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer

    StatUpdate:
      type: object
      properties:
        grade:
          type: string
        season:
          type: integer
        games:
          type: integer
        innings:
          type: integer
        notOuts:
          type: integer
        runs:
          type: integer
        batAvg:
          type: number
        highScore:
          type: string
        fifties:
          type: integer
        hundreds:
          type: integer
        wickets:
          type: integer
        runsConceded:
          type: integer
        bowlAvg:
          type: number
        bestBowling:
          type: string
        fiveWickets:
          type: integer
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer

    StatListResponse:
      type: object
      required: [stats, total, page, limit]
      properties:
        stats:
          type: array
          items:
            $ref: "#/components/schemas/Stat"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    GradeSummary:
      type: object
      required: [grade]
      properties:
        grade:
          type: string
        players:
          type: ["integer", "null"]
        games:
          type: ["integer", "null"]
        innings:
          type: ["integer", "null"]
        runs:
          type: ["integer", "null"]
        wickets:
          type: ["integer", "null"]
        catches:
          type: ["integer", "null"]
        stumpings:
          type: ["integer", "null"]
        runOuts:
          type: ["integer", "null"]

    Dashboard:
      type: object
      required: [totalPlayers, totalGames, totalRuns, totalWickets, gradesCount, topRunScorer, topWicketTaker, topFielder]
      properties:
        totalPlayers:
          type: integer
        totalGames:
          type: integer
        totalRuns:
          type: integer
        totalWickets:
          type: integer
        gradesCount:
          type: integer
        topRunScorer:
          $ref: "#/components/schemas/Player"
        topWicketTaker:
          $ref: "#/components/schemas/Player"
        topFielder:
          $ref: "#/components/schemas/Player"
        gradeSummaries:
          type: array
          items:
            $ref: "#/components/schemas/GradeSummary"

    ImportRecord:
      type: object
      required: [id, filename, status, rowCount, importedAt]
      properties:
        id:
          type: integer
        filename:
          type: string
        grade:
          type: ["string", "null"]
        season:
          type: ["integer", "null"]
        rowCount:
          type: integer
        status:
          type: string
        importedAt:
          type: string
          format: date-time

    ImportPreviewPlayer:
      type: object
      required: [surname, givenName, status]
      properties:
        surname:
          type: string
        givenName:
          type: string
        status:
          type: string
          enum: [matched, new]
        playerId:
          type: ["integer", "null"]

    ImportPreviewGradeTotal:
      type: object
      required: [grade, rows, games, runs, wickets]
      properties:
        grade:
          type: string
        rows:
          type: integer
        games:
          type: integer
        runs:
          type: integer
        wickets:
          type: integer

    ImportPreview:
      type: object
      required: [importId, filename, season, rowsParsed, matchedPlayers, newPlayers, gradeTotals, unmappedGrades, players]
      properties:
        importId:
          type: integer
        filename:
          type: string
        season:
          type: integer
        rowsParsed:
          type: integer
        matchedPlayers:
          type: integer
        newPlayers:
          type: integer
        unmappedGrades:
          type: array
          items:
            type: string
        gradeTotals:
          type: array
          items:
            $ref: "#/components/schemas/ImportPreviewGradeTotal"
        players:
          type: array
          items:
            $ref: "#/components/schemas/ImportPreviewPlayer"

    LifeMemberStats:
      type: object
      required:
        [
          games,
          innings,
          notOuts,
          runs,
          highScore,
          fifties,
          hundreds,
          wickets,
          runsConceded,
          bestBowling,
          fiveWickets,
          catches,
          stumpings,
          runOuts,
          gradesPlayed,
        ]
      properties:
        games:
          type: integer
        innings:
          type: integer
        notOuts:
          type: integer
        runs:
          type: integer
        highScore:
          type: ["string", "null"]
        fifties:
          type: integer
        hundreds:
          type: integer
        wickets:
          type: integer
        runsConceded:
          type: integer
        bestBowling:
          type: ["string", "null"]
        fiveWickets:
          type: integer
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer
        gradesPlayed:
          type: array
          items:
            type: string

    PlayerRecord:
      type: object
      required: [playerId, givenName, surname, value]
      properties:
        playerId:
          type: integer
        givenName:
          type: string
        surname:
          type: string
        value:
          type: integer

    CapEntry:
      type: object
      required: [id, capNumber, name, deceased, inStats, gamesAGrade]
      properties:
        id:
          type: integer
        capNumber:
          type: integer
        name:
          type: string
        deceased:
          type: boolean
        inStats:
          type: boolean
        gamesAGrade:
          type: integer
        playerId:
          type: ["integer", "null"]

    CapEntryInput:
      type: object
      required: [capNumber, name]
      properties:
        capNumber:
          type: integer
        name:
          type: string
        deceased:
          type: boolean
        inStats:
          type: boolean
        gamesAGrade:
          type: integer
        playerId:
          type: ["integer", "null"]

    CapEntryUpdate:
      type: object
      properties:
        capNumber:
          type: integer
        name:
          type: string
        deceased:
          type: boolean
        inStats:
          type: boolean
        gamesAGrade:
          type: integer
        playerId:
          type: ["integer", "null"]

    LifeMember:
      type: object
      required: [id, name, inductionYear, isPlayingMember, blurb]
      properties:
        id:
          type: integer
        name:
          type: string
        inductionYear:
          type: integer
        isPlayingMember:
          type: boolean
        playerId:
