        - Preliminary Final
        - Grand Final
      description: |
        Finals stage of a match. A finals match carries one of these with a NULL
        round; a regular match carries a numeric round with a NULL stage.

    MatchRoundUpdate:
      type: object
      description: |
        Set a match's identity to a numeric round OR a finals stage (mutually
        exclusive). Provide `round` for a regular match, or `stage` for a finals
        match. Setting one clears the other.
      properties:
        round:
          type: ["integer", "null"]
          minimum: 1
          description: New round number for the match (clears stage). Mutually exclusive with stage.
        stage:
          oneOf:
            - $ref: "#/components/schemas/MatchStage"
            - type: "null"
          description: New finals stage for the match (clears round). Mutually exclusive with round.

