openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Halls Head Cricket Club Stats API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: players
    description: Player operations
  - name: stats
    description: Per-grade stats operations
  - name: grades
    description: Grade summary operations
  - name: imports
    description: CSV import operations
  - name: matches
    description: Match scorecard read operations
  - name: caps
    description: A Grade Cap Register operations
  - name: lifeMembers
    description: Life Members operations
  - name: auth
    description: Authentication operations
  - name: admins
    description: Admin user operations
  - name: captains
    description: Grade captain accounts and 3-2-1 voting operations
  - name: honourBoards
    description: Honour board configuration and overrides
  - name: awards
    description: Club awards and their manually-recorded past winners
  - name: teamOfDecade
    description: Curated Team of the Decade honour boards (best XI per team/period)
  - name: clubRoles
    description: Season-by-season club office bearers and grade captains
  - name: people
    description: Non-player club officials (served the club but never played) with lightweight profiles
  - name: records
    description: Derived notable honour-board records (role tenures, award counts)
  - name: juniors
    description: Juniors data (matches, scorecards, players, leaderboards, premierships) — kept completely separate from senior records
  - name: socialCards
    description: Social share card settings, sponsors, and caption templates
  - name: navigation
    description: Admin-configurable navigation menus and quick-link/tile cards
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name
        - name: grade
          in: query
          schema:
            type: string
          description: Filter by grade
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [games, runs, wickets, average, name]
          description: Sort field
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player with all grade stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetail"
        "404":
          description: Not found
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerUpdate"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /players/{id}/seasons:
    get:
      operationId: getPlayerSeasons
      tags: [players]
      summary: Season-by-season stat breakdown for a player
      description: >-
        One row per (grade, season) aggregated from the
        player_grade_season_stats snapshot. Baseline rows (season = null)
        represent the pre-scorecard career total imported with the seed.
        Summing all rows within a grade reproduces that grade's per-grade
        aggregate shown elsewhere.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season-level rows, grouped by grade
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerSeasonStat"

  /players/{id}/matches:
    get:
      operationId: getPlayerMatches
      tags: [players]
      summary: Per-match scorecard lines for a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match lines, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerMatchLine"

  /players/{id}/images:
    get:
      operationId: listPlayerImages
      tags: [players]
      summary: List a player's photo gallery
      description: Gallery images ordered by sort order; the default image first.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerImage"
    post:
      operationId: addPlayerImage
      tags: [players]
      summary: Add an image to a player's gallery
      description: |
        Admin-only. Adds an uploaded image URL to the gallery. The first image
        for a player (or one added with makeDefault) becomes the default and is
        mirrored onto players.image_url.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlayerImageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerImage"

  /players/{id}/images/{imageId}:
    delete:
      operationId: deletePlayerImage
      tags: [players]
      summary: Remove an image from a player's gallery
      description: |
        Admin-only. If the deleted image was the default, the next remaining
        image is promoted to default (or players.image_url is cleared when none
        remain).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /players/{id}/images/{imageId}/default:
    post:
      operationId: setDefaultPlayerImage
      tags: [players]
      summary: Mark a gallery image as the player's default photo
      description: Admin-only. Sets this image as default and mirrors it onto players.image_url.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated default image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerImage"
        "404":
          description: Not found

  /matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List matches, filterable by grade and season
      description: Returns matches ordered most-recent first (by season, then round).
      parameters:
        - name: grade
          in: query
          schema:
            type: string
          description: Filter by grade
        - name: season
          in: query
          schema:
            type: integer
          description: Filter by season starting year
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
          description: Max rows to return (optional; unbounded when omitted)
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
          description: Rows to skip before applying limit (optional)
      responses:
        "200":
          description: List of matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchSummary"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a single match with its full scorecard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match detail with all player lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "404":
          description: Not found
    patch:
      operationId: updateMatchRound
      tags: [matches]
      summary: Update the round of an existing match
      description: |
        Admin-only. Corrects the round number of an already-imported match and
        keeps the originating import row's round in sync. Rounds are unique per
        (grade, season); a colliding round returns 409.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchRoundUpdate"
      responses:
        "200":
          description: Updated match detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "400":
          description: Invalid body
        "401":
          description: Not authenticated as admin
        "404":
          description: Not found
        "409":
          description: Round already used by another match in this grade and season

  /matches/{id}/hat-tricks:
    post:
      operationId: setMatchHatTrick
      tags: [matches]
      summary: Record or remove a hat-trick for a player in a match
      description: |
        Admin-only. Toggles a hat-trick flag for one player in a match. The flag
        surfaces on the public Milestones board as a dated achievement.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchHatTrickInput"
      responses:
        "200":
          description: Updated match detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
        "400":
          description: Invalid body
        "401":
          description: Not authenticated as admin
        "404":
          description: Match or player line not found

  /milestones:
    get:
      operationId: getMilestonesBoard
      tags: [milestones]
      summary: Prioritized, dated milestones for the public Milestones board
      description: |
        Derives dated achievements from real match data — centuries (≥100),
        five-wicket hauls (≥5), admin-recorded hat-tricks, A Grade debuts and
        career-tier crossings across the whole match era. Items are returned
        already ordered: when any match is dated they are listed most-recent
        first (so the board always shows the latest milestones, never blank),
        otherwise items rank by tier significance (bigger first; the baseline
        tier is lowest). Each item carries a `recent` flag for achievements
        inside the configured recency window.
      responses:
        "200":
          description: Ordered milestone items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestonesBoard"

  /stats:
    get:
      operationId: listStats
      tags: [stats]
      summary: List per-grade stats records
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: grade
          in: query
          schema:
            type: string
        - name: playerId
          in: query
          schema:
            type: integer
        - name: season
          in: query
          schema:
            type: integer
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [games, runs, wickets, batAvg, bowlAvg, catches, name, season]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of stat records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatListResponse"
    post:
      operationId: createStat
      tags: [stats]
      summary: Create a stat record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"

  /stats/{id}:
    get:
      operationId: getStat
      tags: [stats]
      summary: Get a stat record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stat record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"
        "404":
          description: Not found
    patch:
      operationId: updateStat
      tags: [stats]
      summary: Update a stat record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatUpdate"
      responses:
        "200":
          description: Updated stat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stat"
        "404":
          description: Not found
    delete:
      operationId: deleteStat
      tags: [stats]
      summary: Delete a stat record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /grades:
    get:
      operationId: listGrades
      tags: [grades]
      summary: List all grades with summary stats
      responses:
        "200":
          description: List of grade summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GradeSummary"

  /grades/{grade}/leaderboard:
    get:
      operationId: getGradeLeaderboard
      tags: [grades]
      summary: Get leaderboard for a specific grade
      parameters:
        - name: grade
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stat"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [grades]
      summary: Club-wide dashboard stats
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

  /overview:
    get:
      operationId: getSeniorOverview
      tags: [grades]
      summary: >-
        Seniors home overview — club totals, the latest season label, that
        season's most recent match per grade, and latest-season top run scorers
        and wicket takers (club-wide across all grades).
      responses:
        "200":
          description: Seniors overview bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeniorOverview"

  /overview/top-performers:
    get:
      operationId: getSeniorSeasonTopPerformers
      tags: [grades]
      summary: >-
        Latest-season top run scorers and wicket takers, optionally filtered to
        a single grade (omit grade for the club-wide combined list).
      parameters:
        - name: grade
          in: query
          required: false
          schema:
            type: string
          description: Single grade to scope the leaders to; omit for club-wide.
        - name: season
          in: query
          required: false
          schema:
            type: integer
          description: >-
            Season start year to scope the leaders to; omit for the latest
            season. Ignored when allTime is true.
        - name: allTime
          in: query
          required: false
          schema:
            type: boolean
          description: When true, aggregate across every season (ignores season).
      responses:
        "200":
          description: Top performers for the resolved season (or all-time)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonTopPerformers"

  /imports:
    get:
      operationId: listImports
      tags: [imports]
      summary: List past CSV imports
      responses:
        "200":
          description: List of imports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportRecord"

  /imports/playcricket-csv:
    post:
      operationId: uploadPlaycricketCsv
      tags: [imports]
      summary: Upload a PlayCricket CSV for preview
      description: |
        Upload a PlayCricket "Combined Batting/Bowling/Fielding" CSV for a
        single grade and season. Server parses the file, creates a pending
        import row, and returns a preview of what will be applied. Nothing
        is written to the snapshot/aggregate tables until `commitImport` is
        called. Generated clients should treat the file as `Blob`; the
        cricket-club frontend posts FormData via raw `fetch` against this
        route.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, season]
              properties:
                file:
                  type: string
                  format: binary
                  description: The PlayCricket CSV export
                season:
                  type: integer
                  description: Starting year of the season (e.g. 2025 for 2025/26)
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreview"
        "400":
          description: Invalid file or season

  /imports/{id}/commit:
    post:
      operationId: commitImport
      tags: [imports]
      summary: Commit a previously-previewed import
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitImportInput"
      responses:
        "200":
          description: Committed import record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommitImportResult"
        "404":
          description: Not found

  /imports/{id}:
    delete:
      operationId: deleteImport
      tags: [imports]
      summary: Delete an import and re-derive aggregates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /imports/match-xlsx:
    post:
      operationId: uploadMatchScorecard
      tags: [imports]
      summary: Upload a single-match scorecard .xlsx for preview
      description: |
        Upload a PlayCricket per-match scorecard export (.xlsx) for one grade and
        round. Server parses the file, creates a pending match import row, and
        returns a preview of the parsed batting/bowling/fielding lines plus
        matched/new players. Nothing is added to season totals until
        `commitImport` is called. Generated clients should treat the file as
        `Blob`; the cricket-club frontend posts FormData via raw `fetch`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: The PlayCricket match scorecard .xlsx export
      responses:
        "200":
          description: Match preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchImportPreview"
        "400":
          description: Invalid file or unmappable grade

  /imports/match-batch:
    post:
      operationId: uploadMatchBatch
      tags: [imports]
      summary: Upload many match scorecards (a whole season) for batch preview
      description: |
        Upload several PlayCricket per-match scorecard .xlsx files at once (or a
        single .zip containing them). Each file is parsed into a candidate match;
        player names are resolved once across the whole batch. Server creates one
        pending holder import row and returns a batch preview listing every
        detected match plus per-file problems (parse failure, missing round,
        duplicate of a stored match, abandoned). Nothing is written to season
        totals until `commitMatchBatch` is called. Generated clients should treat
        the files as `Blob`; the cricket-club frontend posts FormData via raw
        `fetch`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more .xlsx scorecards, and/or a .zip of them
      responses:
        "200":
          description: Batch preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchImportPreview"
        "400":
          description: No usable files

  /imports/match-batch/{id}/commit:
    post:
      operationId: commitMatchBatch
      tags: [imports]
      summary: Commit a previously-previewed match batch
      description: |
        Commit every committable match in the batch. Each match becomes its own
        per-match import row (so it can be deleted or undone individually exactly
        like a single-match import); the holder row is removed. Affected season
        snapshots, career totals and caps are re-derived once.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitImportInput"
      responses:
        "200":
          description: Batch commit summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCommitResult"
        "400":
          description: Nothing committable
        "404":
          description: Not found

  /imports/match-batch/{id}/revalidate:
    post:
      operationId: revalidateMatchBatch
      tags: [imports]
      summary: Re-check a previewed match batch with the admin's round/stage fixes
      description: |
        Re-classify the pending batch holder against the admin's current per-file
        round/stage assignments and return the updated per-file statuses and the
        recomputed committable count. Lets the admin remap a file flagged
        `duplicateInBatch` (or `duplicate`) onto a distinct round/finals stage and
        see the collision clear before committing. Reads the parsed scorecards
        already persisted on the holder — no re-upload is needed. Writes nothing.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRevalidateInput"
      responses:
        "200":
          description: Re-classified per-file statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchRevalidatePreview"
        "404":
          description: Not found

  /imports/undo-season:
    post:
      operationId: undoSeason
      tags: [imports]
      summary: Undo every match import for a grade + season
      description: |
        Delete all per-match imports (and their lines) for the given grade and
        season, re-derive the season snapshot and aggregates, reverse any
        auto-created caps, and remove players left without any data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UndoSeasonInput"
      responses:
        "200":
          description: Undo summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UndoSeasonResult"
        "400":
          description: Invalid grade or season

  /records:
    get:
      operationId: getRecords
      tags: [grades]
      summary: Club all-time records
      responses:
        "200":
          description: All-time records across all grades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubRecords"

  /caps:
    get:
      operationId: listCaps
      tags: [caps]
      summary: List all A Grade cap register entries
      description: Full A Grade cap register in chronological cap-number order.
      responses:
        "200":
          description: Cap register
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CapEntry"
    post:
      operationId: createCap
      tags: [caps]
      summary: Create a cap register entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapEntryInput"
      responses:
        "201":
