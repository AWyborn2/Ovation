        ageGroup:
          type: ["string", "null"]
        teamName:
          type: ["string", "null"]
        competition:
          type: ["string", "null"]
        association:
          type: ["string", "null"]
          description: Governing competition (Peel Junior Cricket Association, Community Cup, Girls League, South West Junior (SWMJCC)).
        matchDate:
          type: ["string", "null"]
        venue:
          type: ["string", "null"]
        venueOval:
          type: ["string", "null"]
          description: Specific oval/ground within the venue complex.
        opponent:
          type: ["string", "null"]
        hhScore:
          type: ["string", "null"]
        oppScore:
          type: ["string", "null"]
        resultText:
          type: ["string", "null"]
        mom:
          type: ["string", "null"]
          description: Man-of-the-match name (admin-entered; not in the source dump).
        matchId:
          type: ["integer", "null"]
        players:
          type: array
          items:
            $ref: "#/components/schemas/JuniorPremiershipPlayer"

    JuniorPremiershipUpdate:
      type: object
      description: Admin edit of a junior premiership's man-of-the-match and captain flags.
      properties:
        mom:
          type: ["string", "null"]
        captainPlayerIds:
          type: array
          description: Ids of junior_premiership_players rows to mark as captain (all others cleared).
          items:
            type: integer

    JuniorTotals:
      type: object
      required: [matches, players, premierships, seasons, ageGroups]
      properties:
        matches:
          type: integer
        players:
          type: integer
        premierships:
          type: integer
        seasons:
          type: integer
        ageGroups:
          type: integer

    JuniorOverview:
      type: object
      required: [totals, latestSeason, recentMatches, topRunScorers, topWicketTakers]
      properties:
        totals:
          $ref: "#/components/schemas/JuniorTotals"
        latestSeason:
          type: ["string", "null"]
          description: Newest season with results (e.g. "2024/25"), or null when none.
        recentMatches:
          type: array
          items:
            $ref: "#/components/schemas/JuniorMatchSummary"
          description: Most recent match per age group fielded in the latest season.
        topRunScorers:
          type: array
          items:
            $ref: "#/components/schemas/JuniorBattingLeader"
        topWicketTakers:
          type: array
          items:
            $ref: "#/components/schemas/JuniorBowlingLeader"

    JuniorSeasonTopPerformers:
      type: object
      required: [season, availableAgeGroups, topRunScorers, topWicketTakers]
      properties:
        season:
          type: ["string", "null"]
          description: >-
            Resolved season these leaders cover (e.g. "2024/25"), or null for
            the all-time list.
        availableAgeGroups:
          type: array
          items:
            type: string
          description: >-
            Age groups that have records in the resolved season (or all age
            groups ever played for the all-time list). Drives the age chips.
        topRunScorers:
          type: array
          items:
            $ref: "#/components/schemas/JuniorBattingLeader"
        topWicketTakers:
          type: array
          items:
            $ref: "#/components/schemas/JuniorBowlingLeader"

    JuniorFilters:
      type: object
      required: [seasons, ageGroups]
      properties:
        seasons:
          type: array
          items:
            type: string
        ageGroups:
          type: array
          items:
            type: string
