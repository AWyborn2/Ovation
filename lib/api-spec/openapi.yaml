    BatchImportFile:
      type: object
      description: |
        One candidate match in a batch upload — the parsed scorecard header plus
        the per-file status that decides whether it will be committed.
      required:
        [filename, status, committable, abandoned, matchExists, playerCount, warnings]
      properties:
        filename:
          type: string
        status:
          type: string
          enum:
            [ready, abandoned, duplicate, duplicateInBatch, missingRound, needsResolution, unmappableGrade, parseError]
          description: |
            ready/abandoned/duplicate are committable; duplicate replaces a stored
            match. needsResolution (a file with neither a numeric round nor a
            recognised finals stage) becomes committable once the admin assigns a
            round or stage via fileResolutions. duplicateInBatch (a later file for
            the same grade+season+round+stage), missingRound (legacy alias of
            needsResolution), unmappableGrade and parseError are excluded.
        committable:
          type: boolean
        grade:
          type: ["string", "null"]
        season:
          type: ["integer", "null"]
        round:
          type: ["integer", "null"]
        stage:
          oneOf:
            - $ref: "#/components/schemas/MatchStage"
            - type: "null"
          description: Finals stage parsed from the scorecard title, or null for a regular round.
        competition:
          type: ["string", "null"]
        matchDate:
          type: ["string", "null"]
        venue:
          type: ["string", "null"]
        result:
          type: ["string", "null"]
        opponent:
          type: ["string", "null"]
        hhccScore:
          type: ["string", "null"]
        opponentScore:
          type: ["string", "null"]
        abandoned:
          type: boolean
        matchExists:
          type: boolean
          description: True if this grade+season+round+stage was already stored (will replace).
        playerCount:
          type: integer
        warnings:
          type: array
          items:
            type: string
        error:
          type: ["string", "null"]
          description: Parse error message when status is parseError.

    BatchImportPlayer:
      type: object
      description: |
        A unique player name across the whole batch, resolved once. The admin's
        link/create decision applies to every match the name appears in.
      required: [surname, givenName, status, candidates, debut, capCategory]
      properties:
        surname:
          type: string
        givenName:
          type: string
        status:
          type: string
          enum: [matched, suggested, new]
        playerId:
          type: ["integer", "null"]
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/NameMatchCandidate"
        debut:
          type: boolean
          description: |
            True if committing would issue this player a first cap in a
            cap-eligible grade (A Grade / Female A Grade) they appear in.
        capCategory:
          type: ["string", "null"]
          enum: [male, female, null]
          description: Cap category relevant to this player, or null if not cap-eligible.
        backfill:
          oneOf:
            - $ref: "#/components/schemas/BackfillPlayerFigures"
            - type: "null"
          description: Net-effect figures for previous-season backfill (matched players only).

    BatchImportPreview:
      type: object
      required:
        [
          importId,
          files,
          players,
          matchedPlayers,
          newPlayers,
          suggestedPlayers,
          debuts,
          committableMatches,
          cappedPlayerIds,
          warnings,
        ]
      properties:
        importId:
          type: integer
          description: The pending holder import row id; pass it to commitMatchBatch.
        files:
          type: array
          items:
            $ref: "#/components/schemas/BatchImportFile"
        players:
          type: array
          items:
            $ref: "#/components/schemas/BatchImportPlayer"
        matchedPlayers:
          type: integer
        newPlayers:
          type: integer
        suggestedPlayers:
          type: integer
        debuts:
          type: integer
        committableMatches:
          type: integer
        cappedPlayerIds:
          type: array
          description: Player ids already capped (union of male+female) for live debut recompute.
          items:
            type: integer
        warnings:
          type: array
          items:
            type: string

    BatchRevalidateInput:
      type: object
      description: |
        The admin's current per-file round/stage assignments to re-check a
        previewed batch against. Each entry remaps the named file's identity;
        files without an entry keep the round/stage parsed from their scorecard.
      properties:
        fileResolutions:
          type: array
          items:
            $ref: "#/components/schemas/BatchFileResolution"

    BatchRevalidatePreview:
      type: object
      required: [files, committableMatches]
      description: |
        Result of re-classifying a pending batch holder with the admin's current
        round/stage fixes — the same per-file shape as the upload preview, plus
        the recomputed committable count, so the UI can refresh statuses live.
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/BatchImportFile"
        committableMatches:
          type: integer

    BatchCommittedMatch:
      type: object
      required: [importId, filename, grade, season]
      properties:
        importId:
          type: integer
        filename:
          type: string
        grade:
          type: string
        season:
          type: integer
        round:
          type: ["integer", "null"]
        stage:
          oneOf:
            - $ref: "#/components/schemas/MatchStage"
            - type: "null"
          description: Finals stage of the committed match, or null for a regular round.

    BatchCommitResult:
      type: object
      required: [committed, matches, capsSync]
      properties:
        committed:
          type: integer
        matches:
          type: array
          items:
            $ref: "#/components/schemas/BatchCommittedMatch"
        capsSync:
          type: array
          items:
            $ref: "#/components/schemas/CapSyncSummary"
        reconcileMode:
          type: ["string", "null"]
          enum: [peel, add, null]
          description: Echoes the backfill reconcile mode applied, or null for a normal batch.
        negativeWarnings:
          type: array
          description: Players whose baseline floored at zero during a peel (career total changed).
          items:
            $ref: "#/components/schemas/NegativeBaselineWarning"

    PlayerResolution:
      type: object
      required: [surname, givenName, action]
      description: |
        An admin's decision for one previewed name: link it to an existing
        player or create a new one. Keyed back to the parsed row by name.
      properties:
        surname:
          type: string
        givenName:
          type: string
        action:
          type: string
          enum: [link, create]
        playerId:
          type: ["integer", "null"]
          description: Existing player to link to (required when action is `link`).

    BatchFileResolution:
      type: object
      required: [filename]
      description: |
        Admin's round/stage assignment for one batch file. Used both for a file
        that parsed without a numeric round or a recognised finals stage
        (status needsResolution) and to remap a file flagged duplicate /
        duplicateInBatch onto a distinct identity. Exactly one of round/stage
        should be provided; if stage is set it wins and round is ignored.
      properties:
        filename:
          type: string
        round:
          type: ["integer", "null"]
          minimum: 1
        stage:
          oneOf:
            - $ref: "#/components/schemas/MatchStage"
            - type: "null"

    BackfillPlayerFigures:
      type: object
      description: |
        Per-player figures for previewing a previous-season backfill's net effect.
        `season*` is this import's contribution for the resolved player; `baseline*`
        is the player's current season=NULL all-time baseline for the relevant
        grade; `career*` is the player's current career total. The UI computes the
        peel/add net effect from these. Present only on matched/linked players.
      required:
        [seasonGames, seasonRuns, seasonWickets, baselineGames, baselineRuns, baselineWickets, careerGames, careerRuns, careerWickets]
      properties:
        seasonGames:
          type: integer
        seasonRuns:
          type: integer
        seasonWickets:
          type: integer
        baselineGames:
          type: integer
        baselineRuns:
          type: integer
        baselineWickets:
          type: integer
        careerGames:
          type: integer
        careerRuns:
          type: integer
        careerWickets:
          type: integer

    NegativeBaselineWarning:
      type: object
      description: |
        A player whose all-time baseline could not absorb the full peel (the
        season being peeled has more games than the baseline holds), so the
        baseline floored at zero and the player's career total changed. Surfaced
        for club review; never blocks the commit.
      required: [playerId, surname, givenName, seasonGames, baselineGames]
      properties:
        playerId:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        seasonGames:
          type: integer
        baselineGames:
          type: integer

    CommitImportInput:
      type: object
      description: |
        Optional per-name resolutions chosen in the preview, plus an optional
        round for per-match imports. Names without a resolution fall back to
        exact-match-or-create.
      properties:
        resolutions:
          type: array
          items:
            $ref: "#/components/schemas/PlayerResolution"
        round:
          type: ["integer", "null"]
          description: |
            For per-match (.xlsx) imports: the round to assign to the committed
            match. Overrides the value parsed from the scorecard header (and
            supplies one when the header had none). Ignored for whole-season
            CSV imports. Mutually exclusive with stage — if stage is set, round
            is forced to null.
        stage:
          oneOf:
            - $ref: "#/components/schemas/MatchStage"
            - type: "null"
          description: |
            For per-match (.xlsx) imports: the finals stage to assign to the
            committed match. When set, the match is a final (round forced null).
            Mutually exclusive with round. Ignored for whole-season CSV imports.
        fileResolutions:
          type: array
          description: |
            For batch (.zip / multi-file) match imports: per-file round/stage
            assignments for files that parsed without a numeric round or a
            recognised finals stage (status needsResolution). Each entry sets
            either a round or a stage for the named file; matched by filename.
          items:
            $ref: "#/components/schemas/BatchFileResolution"
        reconcileMode:
          type: ["string", "null"]
          enum: [peel, add, null]
          description: |
            Marks this as a PREVIOUS-season backfill and how to reconcile it with
            current totals. `peel`: the season is already counted inside the
            grade's all-time baseline, so subtract its per-player contribution
            from that baseline (career totals stay invariant, floored at zero).
            `add`: the season is genuinely missing, so add it only. When set,
            social/milestone generation is suppressed and no out-of-order caps are
            minted (existing linked caps are still refreshed). Omit/null for the
            normal current-season flow.

