    MilestoneBoardSettings:
      type: object
      required:
        - displayMode
        - gamesThreshold
        - runsThreshold
        - wicketsThreshold
        - recencyWeeks
        - gamesTiers
        - runsTiers
        - wicketsTiers
      properties:
        displayMode:
          type: string
          enum: [recent, approaching, both]
          description: What the public Significant Milestones section shows.
        gamesThreshold:
          type: integer
          minimum: 1
          description: Minimum games for a significant club (default 100).
        runsThreshold:
          type: integer
          minimum: 1
          description: Minimum runs for a significant club (default 1000).
        wicketsThreshold:
          type: integer
          minimum: 1
          description: Minimum wickets for a significant club (default 100).
        recencyWeeks:
          type: integer
          minimum: 1
          description: >-
            Weeks back (by real match date) that count as a recent achievement
            on the Milestones board (default 4).
        gamesTiers:
          type: array
          items:
            type: integer
          description: Significance tiers for games; first entry is the baseline lowest.
        runsTiers:
          type: array
          items:
            type: integer
          description: Significance tiers for runs; first entry is the baseline lowest.
        wicketsTiers:
          type: array
          items:
            type: integer
          description: Significance tiers for wickets; first entry is the baseline lowest.

    MilestoneBoardSettingsUpdate:
      type: object
      properties:
        displayMode:
          type: string
          enum: [recent, approaching, both]
        gamesThreshold:
          type: integer
          minimum: 1
        runsThreshold:
          type: integer
          minimum: 1
        wicketsThreshold:
          type: integer
          minimum: 1
        recencyWeeks:
          type: integer
          minimum: 1
        gamesTiers:
          type: array
          items:
            type: integer
            minimum: 1
        runsTiers:
          type: array
          items:
            type: integer
            minimum: 1
        wicketsTiers:
          type: array
          items:
            type: integer
            minimum: 1

    MatchDisplaySettings:
      type: object
      required:
        - defaultGrade
        - defaultSeasonMode
        - gradeOrder
        - roundOrder
      properties:
        defaultGrade:
          type: string
          description: Grade pre-selected on first load. Empty string = All grades.
        defaultSeasonMode:
          type: string
          enum: [latest, specific, all]
          description: >-
            How the default season is chosen: latest available season, a
            specific season, or all seasons.
        defaultSeason:
          type: integer
          nullable: true
          description: Specific season start-year used when defaultSeasonMode = specific.
        gradeOrder:
          type: array
          items:
            type: string
          description: >-
            Ordered grade names for the grade menu. Grades not listed fall back to
            the built-in seniority order, appended after the configured ones.
        roundOrder:
          type: string
          enum: [asc, desc]
          description: >-
            Within-season round direction: asc (round 1 first) or desc (latest
            round first). Season ordering always stays newest-first.

    MatchDisplaySettingsUpdate:
      type: object
      properties:
        defaultGrade:
          type: string
        defaultSeasonMode:
          type: string
          enum: [latest, specific, all]
        defaultSeason:
          type: integer
          nullable: true
        gradeOrder:
          type: array
          items:
