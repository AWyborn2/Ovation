          type: ["integer", "null"]
        wickets:
          type: ["integer", "null"]
        catches:
          type: ["integer", "null"]
        stumpings:
          type: ["integer", "null"]
        runOuts:
          type: ["integer", "null"]

    Dashboard:
      type: object
      required: [totalPlayers, totalGames, totalRuns, totalWickets, gradesCount, topRunScorer, topWicketTaker, topFielder]
      properties:
        totalPlayers:
          type: integer
        totalGames:
          type: integer
        totalRuns:
          type: integer
        totalWickets:
          type: integer
        gradesCount:
          type: integer
        topRunScorer:
          $ref: "#/components/schemas/Player"
        topWicketTaker:
          $ref: "#/components/schemas/Player"
        topFielder:
          $ref: "#/components/schemas/Player"
        gradeSummaries:
          type: array
          items:
            $ref: "#/components/schemas/GradeSummary"

    ImportRecord:
      type: object
      required: [id, filename, status, rowCount, importedAt, kind]
      properties:
        id:
          type: integer
        filename:
          type: string
        grade:
          type: ["string", "null"]
        season:
          type: ["integer", "null"]
        round:
          type: ["integer", "null"]
        kind:
          type: string
          description: "csv (whole-season) or match (per-match scorecard)"
        rowCount:
          type: integer
        status:
          type: string
        importedAt:
          type: string
          format: date-time

    CapSyncSummary:
      type: object
      required: [grade, category, updated, created]
      properties:
        grade:
          type: string
        category:
          $ref: "#/components/schemas/CapCategory"
        updated:
          type: integer
        created:
          type: integer

    CommitImportResult:
      type: object
      required: [id, filename, status, rowCount, importedAt, kind, capsSync]
      properties:
        id:
          type: integer
        filename:
          type: string
        grade:
          type: ["string", "null"]
        season:
          type: ["integer", "null"]
        round:
          type: ["integer", "null"]
        kind:
          type: string
        rowCount:
          type: integer
        status:
          type: string
        importedAt:
          type: string
          format: date-time
        capsSync:
          type: array
          items:
            $ref: "#/components/schemas/CapSyncSummary"

    NameMatchCandidate:
      type: object
      required: [playerId, surname, givenName, reason]
      description: |
        A likely the-same-person suggestion for a scorecard/CSV name that has no
        exact roster match (first-name variant, nickname, or surname spelling).
        Surfaced for explicit admin confirmation; never linked automatically.
      properties:
        playerId:
          type: integer
        surname:
          type: string
        givenName:
          type: string
        reason:
          type: string

    ImportPreviewPlayer:
      type: object
      required: [surname, givenName, status, candidates, debut]
      properties:
        surname:
          type: string
        givenName:
          type: string
        status:
          type: string
          enum: [matched, suggested, new]
        playerId:
          type: ["integer", "null"]
        candidates:
          type: array
          description: Suggested existing players when status is `suggested`.
          items:
            $ref: "#/components/schemas/NameMatchCandidate"
        debut:
          type: boolean
          description: |
            True if committing would issue this player their first cap in the
            import's cap-eligible grade (A Grade / Female A Grade).

    ImportPreviewGradeTotal:
      type: object
      required: [grade, rows, games, runs, wickets]
      properties:
        grade:
          type: string
        rows:
          type: integer
        games:
          type: integer
        runs:
          type: integer
        wickets:
          type: integer

    ImportPreview:
      type: object
      required: [importId, filename, season, rowsParsed, matchedPlayers, newPlayers, suggestedPlayers, debuts, gradeTotals, unmappedGrades, players, capCategory, cappedPlayerIds]
      properties:
        importId:
          type: integer
        filename:
          type: string
        season:
          type: integer
        rowsParsed:
          type: integer
        matchedPlayers:
          type: integer
        newPlayers:
          type: integer
        suggestedPlayers:
          type: integer
          description: Count of names with a fuzzy suggestion awaiting confirmation.
        debuts:
          type: integer
          description: Count of players who would earn a first cap on commit.
        capCategory:
          type: ["string", "null"]
          enum: [male, female, null]
          description: Cap category of the import's grade, or null if not cap-eligible.
        cappedPlayerIds:
          type: array
          description: Player ids already holding a cap in `capCategory` (for live debut recompute).
          items:
            type: integer
        unmappedGrades:
          type: array
          items:
            type: string
        gradeTotals:
          type: array
          items:
            $ref: "#/components/schemas/ImportPreviewGradeTotal"
        players:
          type: array
          items:
            $ref: "#/components/schemas/ImportPreviewPlayer"

    MatchPreviewPlayer:
      type: object
      required:
        [surname, givenName, status, candidates, debut, batted, bowled, catches, stumpings, runOuts]
      properties:
        surname:
          type: string
        givenName:
          type: string
        status:
          type: string
          enum: [matched, suggested, new]
        playerId:
          type: ["integer", "null"]
        candidates:
          type: array
          description: Suggested existing players when status is `suggested`.
          items:
            $ref: "#/components/schemas/NameMatchCandidate"
        debut:
          type: boolean
          description: |
            True if committing would issue this player their first cap in the
            match's cap-eligible grade (A Grade / Female A Grade).
        batted:
          type: boolean
        battingPos:
          type: ["integer", "null"]
        runs:
          type: ["integer", "null"]
        balls:
          type: ["integer", "null"]
        notOut:
          type: boolean
        dismissal:
          type: ["string", "null"]
        bowled:
          type: boolean
        overs:
          type: ["string", "null"]
        wickets:
          type: ["integer", "null"]
        runsConceded:
          type: ["integer", "null"]
        catches:
          type: integer
        stumpings:
          type: integer
        runOuts:
          type: integer

    MatchImportPreview:
      type: object
      required:
        [
          importId,
          filename,
          abandoned,
          matchExists,
          matchedPlayers,
