name: CI

# Runs on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run for a branch/PR when a newer commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the toolchain. Bump deliberately; keep in step with local dev.
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Typecheck the whole monorepo. Hermetic (no DB, no services). Fast gate.
  # ───────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

  # ───────────────────────────────────────────────────────────────────────────
  # Website smoke tests (cricket-club). Hermetic — fetch is mocked, no backend
  # or database needed. See artifacts/cricket-club/src/test/README.md.
  # ───────────────────────────────────────────────────────────────────────────
  web-tests:
    name: Web smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run cricket-club smoke tests
        run: pnpm --filter @workspace/cricket-club test

  # ───────────────────────────────────────────────────────────────────────────
  # API server tests (api-server). These are REAL-DB integration tests: they
  # import the Express app and hit a live Postgres (tenant isolation, billing,
  # platform-admin, consistency suites). So CI spins up Postgres, applies the
  # Drizzle schema with `db push`, then runs vitest against it.
  # ───────────────────────────────────────────────────────────────────────────
  api-tests:
    name: API integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ovation_test
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Local service Postgres — never a real/shared database.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ovation_test
      # Deterministic secret so session-cookie signing is stable across the run.
      SESSION_SECRET: ci-session-secret-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply database schema
        # Non-interactive: --force skips the drizzle-kit confirmation prompt.
        run: pnpm --filter @workspace/db run push-force

      - name: Seed tenant #1 (fresh-DB only)
        # A CI database built fresh from `db push` is empty; the integration
        # tests assume the demo tenant (Halls Head, id 1) exists. Idempotent.
        run: pnpm --filter @workspace/api-server run seed:ci

      - name: Run api-server tests
        run: pnpm --filter @workspace/api-server test
